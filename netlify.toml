# Netlify-Deployment (Frontend). Personenbezogene Daten gehen möglichst
# direkt vom Client an Supabase (EU/Frankfurt), nicht über Netlify.
# PUBLIC_SUPABASE_URL / PUBLIC_SUPABASE_ANON_KEY in den Netlify-Env-Variablen setzen.
[build]
  command = "npm run build"
  publish = "build"

# Node 24: gleiche Version wie die lokal verifizierte (clean) Build-Umgebung.
# Unter Node 22 brach der vite-pwa/SvelteKit-Service-Worker-Build auf Netlify ab
# (output/client/service-worker.js wurde nicht rechtzeitig erzeugt -> swSrc ENOENT).
[build.environment]
  NODE_VERSION = "24"
