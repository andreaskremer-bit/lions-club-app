name: Supabase Keep-alive

# Hält das Supabase-Free-Tier-Projekt wach – es würde sonst nach 7 Tagen
# ohne API-/DB-Zugriff pausiert. Ein kleiner REST-Call alle ~3 Tage genügt.
# Benötigt zwei Repo-Secrets: SUPABASE_URL und SUPABASE_ANON_KEY.

on:
  schedule:
    - cron: '0 6 */3 * *' # alle ~3 Tage, 06:00 UTC
  workflow_dispatch: {} # zusätzlich manuell auslösbar

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping gegen Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # auth/v1/health mit apikey liefert verlässlich 200 (unabhängig vom DB-Schema)
          # und hält das Projekt wach.
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "apikey: $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/auth/v1/health")
          echo "Health-Ping HTTP $code"
          if [ "$code" != "200" ]; then
            echo "::warning::Unerwarteter Status $code – Projekt evtl. pausiert oder reaktiviert gerade."
            exit 1
          fi
