name: Supabase Keep-alive

# Hält das Supabase-Free-Tier-Projekt wach – es würde sonst nach 7 Tagen ohne
# Aktivität pausiert. Ruft täglich die RPC public.keepalive() (select now())
# auf: ein echter DB-Roundtrip (geht bis Postgres durch), liefert sauberes 200
# und greift auf KEINE Daten zu. Robuster als /auth/v1/health, das nur
# Gateway/Auth erreicht.
#
# Benötigt zwei Repo-Secrets:
#   SUPABASE_URL        – z. B. https://<ref>.supabase.co
#   SUPABASE_ANON_KEY   – der aktuelle PUBLIC-Key (sb_publishable_…),
#                         NICHT der alte/deaktivierte Legacy-JWT (sonst 401).

on:
  schedule:
    - cron: '0 6 * * *' # täglich 06:00 UTC (Puffer, falls GitHub einen Lauf auslässt)
  workflow_dispatch: {} # zusätzlich manuell auslösbar

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Keep-alive-RPC gegen Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "$SUPABASE_URL/rest/v1/rpc/keepalive")
          echo "Keep-alive-RPC HTTP $code"
          if [ "$code" != "200" ]; then
            echo "::error::Keep-alive fehlgeschlagen (HTTP $code). 401 → Repo-Secret SUPABASE_ANON_KEY prüfen (aktueller sb_publishable_…-Key?); 404 → Migration keepalive_rpc nicht aufs Remote gepusht?; 5xx/000 → Projekt evtl. pausiert/reaktiviert gerade."
            exit 1
          fi
          echo "Projekt ist wach."
