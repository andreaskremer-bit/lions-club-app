<!doctype html>
<html lang="de">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="stylesheet" href="../../styles.css" />
		<script
			src="https://unpkg.com/react@18.3.1/umd/react.development.js"
			integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
			crossorigin="anonymous"
		></script>
		<script
			src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
			integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
			crossorigin="anonymous"
		></script>
		<script
			src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
			integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
			crossorigin="anonymous"
		></script>
		<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
		<script src="../../_ds_bundle.js"></script>
		<style>
			body {
				padding: 24px;
				background: var(--surface-app);
			}
			.cols {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 26px;
			}
			.stack {
				display: flex;
				flex-direction: column;
				gap: 16px;
			}
			.lbl {
				font-family: var(--font-mono);
				font-size: 11px;
				letter-spacing: 0.06em;
				text-transform: uppercase;
				color: var(--text-muted);
				margin-bottom: 9px;
			}
		</style>
	</head>
	<body>
		<div id="root"></div>
		<script type="text/babel">
			const { Input, OtpInput, Select, Checkbox, Switch, SegmentedControl } =
				window.LionsClubBonnRheinaueDesignSystem_4b530e;
			const Ic = ({ n }) => <i data-lucide={n}></i>;

			function Demo() {
				const [code, setCode] = React.useState('4827');
				const [view, setView] = React.useState('liste');
				return (
					<div className="cols">
						<div className="stack">
							<div>
								<div className="lbl">Input</div>
								<div className="stack">
									<Input
										label="E-Mail"
										type="email"
										required
										icon={<Ic n="mail" />}
										defaultValue="kremer@example.de"
									/>
									<Input
										label="Handy"
										error="Bitte eine gültige Nummer eingeben."
										defaultValue="0170 1"
									/>
								</div>
							</div>
							<div>
								<div className="lbl">OTP-Code</div>
								<OtpInput value={code} onChange={setCode} />
							</div>
						</div>

						<div className="stack">
							<div>
								<div className="lbl">Select</div>
								<Select
									label="Hauptgang"
									options={['Rinderfilet', 'Lachs', 'Vegetarisch']}
									defaultValue="Lachs"
								/>
							</div>
							<div>
								<div className="lbl">Auswahl & Schalter</div>
								<div className="stack">
									<Checkbox
										label="Begleitperson mitbringen"
										description="Name im nächsten Schritt"
										defaultChecked
									/>
									<Checkbox radio name="g" label="Vegetarisch" defaultChecked />
									<Switch label="Push-Erinnerungen" defaultChecked />
								</div>
							</div>
							<div>
								<div className="lbl">SegmentedControl</div>
								<SegmentedControl
									value={view}
									onChange={setView}
									options={[
										{ label: 'Liste', value: 'liste', icon: <Ic n="list" /> },
										{ label: 'Kalender', value: 'kalender', icon: <Ic n="calendar" /> }
									]}
								/>
							</div>
						</div>
					</div>
				);
			}
			ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
			requestAnimationFrame(() => window.lucide && window.lucide.createIcons());
		</script>
	</body>
</html>
