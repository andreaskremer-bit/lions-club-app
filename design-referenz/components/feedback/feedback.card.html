<!-- @dsCard group="Components" viewport="700x360" name="Feedback — Status & Hints" subtitle="Registration status badges and the gentle left-stripe hint card" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { padding: 24px; background: var(--surface-app); }
  .grid { display: flex; flex-direction: column; gap: 20px; }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 9px; }
  .block + .block { border-top: 1px solid var(--border-hairline); padding-top: 18px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { StatusBadge, HintCard } = window.LionsClubBonnRheinaueDesignSystem_4b530e;
const Ic = ({ n }) => <i data-lucide={n}></i>;

function Demo() {
  return (
    <div className="grid">
      <div className="block">
        <div className="lbl">StatusBadge — Anmeldestatus</div>
        <div className="row">
          <StatusBadge status="yes" />
          <StatusBadge status="no" />
          <StatusBadge status="open" />
          <StatusBadge status="present" />
        </div>
        <div className="row" style={{ marginTop: 12, gap: 16 }}>
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}><StatusBadge status="yes" dotOnly /> <span style={{ fontSize: 14, color: 'var(--text-secondary)' }}>nur Punkt (Listenzeile)</span></span>
          <StatusBadge status="no" dotOnly />
          <StatusBadge status="open" dotOnly />
        </div>
      </div>

      <div className="block">
        <div className="lbl">HintCard — sanfte Hinweise</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          <HintCard tone="warning" icon={<Ic n="info" />} title="Abwesenheit löst eine Spende aus">
            Aktive Mitglieder, die fehlen, erhalten automatisch eine Spendenposition für den Förderverein.
          </HintCard>
          <HintCard tone="info" icon={<Ic n="clock" />}>
            3 Tage vor dem Termin erinnern wir alle, die noch nicht geantwortet haben.
          </HintCard>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
requestAnimationFrame(() => window.lucide && window.lucide.createIcons());
</script>
</body>
</html>
