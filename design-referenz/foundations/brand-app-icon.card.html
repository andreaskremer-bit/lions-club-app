<!-- @dsCard group="Brand" viewport="700x230" name="App icon & favicon" subtitle="PWA home-screen icon (cream tile), maskable safe zone, and browser favicon" -->
<!doctype html>
<html lang="de">
	<head>
		<meta charset="utf-8" />
		<link rel="stylesheet" href="../styles.css" />
		<style>
			body {
				margin: 0;
				padding: 26px;
				background: var(--surface-card);
				font-family: var(--font-sans);
			}
			.row {
				display: flex;
				align-items: flex-start;
				gap: 30px;
				flex-wrap: wrap;
			}
			.item {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 9px;
			}
			.cap {
				font-family: var(--font-mono);
				font-size: 10px;
				letter-spacing: 0.05em;
				text-transform: uppercase;
				color: var(--text-muted);
			}

			/* home-screen install tile */
			.tile {
				width: 96px;
				height: 96px;
				border-radius: 23%;
				overflow: hidden;
				box-shadow: var(--shadow-md);
			}
			.tile img {
				width: 100%;
				height: 100%;
				display: block;
			}
			.applabel {
				font-size: 13px;
				color: var(--text-strong);
				font-weight: 500;
			}

			/* maskable circular crop */
			.mask {
				width: 96px;
				height: 96px;
				border-radius: 50%;
				overflow: hidden;
				border: 1px solid var(--border-hairline);
			}
			.mask img {
				width: 100%;
				height: 100%;
				display: block;
			}

			/* faux browser tab with favicon */
			.tab {
				display: inline-flex;
				align-items: center;
				gap: 8px;
				background: var(--surface-app);
				border: 1px solid var(--border-hairline);
				border-bottom: none;
				border-radius: 10px 10px 0 0;
				padding: 9px 14px;
			}
			.tab img {
				width: 18px;
				height: 18px;
				border-radius: 4px;
			}
			.tab span {
				font-size: 13px;
				color: var(--text-body);
				white-space: nowrap;
			}
			.tabwrap {
				display: flex;
				flex-direction: column;
			}
			.tabbase {
				height: 6px;
				background: var(--surface-app);
				border: 1px solid var(--border-hairline);
				border-top: none;
				border-radius: 0 0 4px 4px;
			}

			.note {
				max-width: 230px;
				font-size: 13px;
				color: var(--text-secondary);
				line-height: 1.5;
			}
			.note b {
				color: var(--text-strong);
				font-weight: 600;
			}
		</style>
	</head>
	<body>
		<div class="row">
			<div class="item">
				<div class="tile"><img src="../assets/pwa-icon.png" alt="App-Icon" /></div>
				<div class="applabel">Lions&nbsp;BR</div>
				<div class="cap">Home-Screen</div>
			</div>
			<div class="item">
				<div class="mask"><img src="../assets/pwa-icon-maskable.png" alt="Maskable Icon" /></div>
				<div class="cap">Maskable · Safe Zone</div>
			</div>
			<div class="item">
				<div class="tabwrap">
					<div class="tab">
						<img src="../assets/favicon.png" alt="Favicon" /><span>Lions Club Bonn-Rheinaue</span>
					</div>
					<div class="tabbase"></div>
				</div>
				<div class="cap">Favicon · Browser-Tab</div>
			</div>
			<p class="note">
				Das Emblem sitzt auf einer <b>warmen Creme-Kachel</b> für maximale Lesbarkeit. Die maskable
				Variante hat mehr Rand, damit der runde Zuschnitt (Android) nichts abschneidet.
				<b>theme-color</b> = Lions-Blau.
			</p>
		</div>
	</body>
</html>
