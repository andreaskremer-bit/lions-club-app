<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px base unit; generous, calm rhythm" -->
<!doctype html>
<html lang="de">
	<head>
		<meta charset="utf-8" />
		<link rel="stylesheet" href="../styles.css" />
		<style>
			body {
				margin: 0;
				padding: 24px;
				background: var(--surface-card);
			}
			.rows {
				display: flex;
				flex-direction: column;
				gap: 9px;
			}
			.r {
				display: flex;
				align-items: center;
				gap: 14px;
			}
			.bar {
				height: 14px;
				background: var(--blue-100);
				border-radius: 3px;
			}
			.name {
				font-family: var(--font-mono);
				font-size: 12px;
				color: var(--text-secondary);
				width: 92px;
			}
			.px {
				font-family: var(--font-mono);
				font-size: 12px;
				color: var(--text-muted);
			}
		</style>
	</head>
	<body>
		<div class="rows">
			<div class="r">
				<span class="name">--space-2</span><span class="bar" style="width: 8px"></span
				><span class="px">8</span>
			</div>
			<div class="r">
				<span class="name">--space-3</span><span class="bar" style="width: 12px"></span
				><span class="px">12</span>
			</div>
			<div class="r">
				<span class="name">--space-4</span><span class="bar" style="width: 16px"></span
				><span class="px">16</span>
			</div>
			<div class="r">
				<span class="name">--space-5</span><span class="bar" style="width: 20px"></span
				><span class="px">20 · gutter</span>
			</div>
			<div class="r">
				<span class="name">--space-6</span><span class="bar" style="width: 24px"></span
				><span class="px">24</span>
			</div>
			<div class="r">
				<span class="name">--space-7</span><span class="bar" style="width: 32px"></span
				><span class="px">32</span>
			</div>
			<div class="r">
				<span class="name">--space-9</span><span class="bar" style="width: 48px"></span
				><span class="px">48</span>
			</div>
		</div>
	</body>
</html>
