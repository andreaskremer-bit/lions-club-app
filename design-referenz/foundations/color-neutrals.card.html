<!-- @dsCard group="Colors" viewport="700x150" name="Warm Neutrals — Cream" subtitle="App base, card surfaces and hairline borders — the source of the warmth" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); }
  .swatches { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .sw { border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border-hairline); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; }
  .name { font-family: var(--font-sans); font-size: 13px; font-weight: 600; color: var(--text-strong); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); text-transform: uppercase; }
</style>
</head>
<body>
<div class="swatches">
  <div class="sw"><div class="chip" style="background:var(--cream-50)"></div><div class="meta"><div class="name">cream-50</div><div class="hex">#FBF8F1</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--cream-100)"></div><div class="meta"><div class="name">cream-100</div><div class="hex">#F6F1E7 · app</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--cream-card)"></div><div class="meta"><div class="name">card</div><div class="hex">#FCFAF4</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--cream-200)"></div><div class="meta"><div class="name">cream-200</div><div class="hex">#EFE8D9</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--cream-300)"></div><div class="meta"><div class="name">cream-300</div><div class="hex">#E4DCCB · line</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--cream-400)"></div><div class="meta"><div class="name">cream-400</div><div class="hex">#D6CBB4</div></div></div>
</div>
</body>
</html>
