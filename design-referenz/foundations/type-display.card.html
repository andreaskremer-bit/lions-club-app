<!-- @dsCard group="Type" viewport="700x230" name="Display — Source Serif 4" subtitle="Headlines only. Warm, high-contrast serif" -->
<!doctype html>
<html lang="de">
	<head>
		<meta charset="utf-8" />
		<link rel="stylesheet" href="../styles.css" />
		<style>
			body {
				margin: 0;
				padding: 24px;
				background: var(--surface-card);
			}
			.stack {
				display: flex;
				flex-direction: column;
				gap: 6px;
			}
			.line {
				font-family: var(--font-display);
				color: var(--text-strong);
				font-weight: 600;
				line-height: 1.1;
				letter-spacing: -0.01em;
			}
			.tag {
				font-family: var(--font-mono);
				font-size: 10px;
				color: var(--text-muted);
				letter-spacing: 0.06em;
				text-transform: uppercase;
				margin-left: 10px;
				vertical-align: middle;
				font-weight: 500;
			}
		</style>
	</head>
	<body>
		<div class="stack">
			<div class="line" style="font-size: 41px">
				Terminübersicht<span class="tag">3xl · 41 / 700</span>
			</div>
			<div class="line" style="font-size: 33px">
				Club-Abend im Juni<span class="tag">2xl · 33 / 600</span>
			</div>
			<div class="line" style="font-size: 27px">
				Anwesenheit erfassen<span class="tag">xl · 27 / 600</span>
			</div>
			<div class="line" style="font-size: 22px; font-weight: 600">
				Begleitperson &amp; Menüauswahl<span class="tag">lg · 22 / 600</span>
			</div>
		</div>
	</body>
</html>
