<!doctype html>
<html lang="de">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Lions Club Bonn-Rheinaue — App · Alle Screens</title>
		<meta name="theme-color" content="#1E4FA3" />
		<meta
			name="ext-resource-dependency"
			content="../../assets/lions-emblem.png"
			data-resource-id="lionsEmblem"
		/>
		<link rel="stylesheet" href="../../styles.css" />
		<link rel="stylesheet" href="app.css" />
		<script
			src="https://unpkg.com/react@18.3.1/umd/react.development.js"
			integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
			crossorigin="anonymous"
		></script>
		<script
			src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
			integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
			crossorigin="anonymous"
		></script>
		<script
			src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
			integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
			crossorigin="anonymous"
		></script>
		<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
		<script src="../../_ds_bundle.js"></script>
		<script src="data.js"></script>
		<style>
			html,
			body {
				background: var(--surface-app);
				margin: 0;
			}
			body {
				display: block !important;
				align-items: initial !important;
				justify-content: initial !important;
				min-height: 0 !important;
				padding: 0 !important;
			}
			#root {
				display: block !important;
			}
			.doc-head {
				text-align: center;
				padding: 44px 20px 8px;
			}
			.doc-head img {
				width: 64px;
				height: 64px;
				object-fit: contain;
			}
			.doc-head h1 {
				font-family: var(--font-display);
				font-weight: 600;
				font-size: 30px;
				color: var(--text-strong);
				margin: 12px 0 4px;
				letter-spacing: -0.01em;
			}
			.doc-head p {
				font-size: 15px;
				color: var(--text-secondary);
				margin: 0;
			}
			.doc-head .eyebrow {
				font-family: var(--font-mono);
				font-size: 11px;
				letter-spacing: 0.14em;
				text-transform: uppercase;
				color: var(--gold-700);
				margin-bottom: 6px;
			}
			.grid {
				display: flex;
				flex-wrap: wrap;
				justify-content: center;
				gap: 36px 30px;
				padding: 24px 20px 56px;
				max-width: 1320px;
				margin: 0 auto;
			}
			.item {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 14px;
			}
			.cap {
				font-family: var(--font-display);
				font-weight: 600;
				font-size: 19px;
				color: var(--text-strong);
				letter-spacing: -0.01em;
				white-space: nowrap;
			}
			.cap small {
				font-family: var(--font-mono);
				font-weight: 500;
				font-size: 12px;
				letter-spacing: 0.06em;
				text-transform: uppercase;
				color: var(--text-muted);
				margin-right: 9px;
			}

			/* Expand each phone frame to full content height */
			.item .pf {
				height: auto;
				max-height: none;
				box-shadow: 0 22px 50px -22px rgba(33, 30, 24, 0.4);
			}
			.item .pf,
			.item .pf__screen,
			.item .pf__body,
			.item .app,
			.item .app__body,
			.item .screen,
			.item .screen__scroll {
				height: auto !important;
				min-height: 0 !important;
				overflow: visible !important;
			}
			.item .detail__cta {
				position: static;
			}
		</style>
		<template id="__bundler_thumbnail" data-bg-color="#F6F1E7">
			<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
				<rect width="1200" height="800" fill="#F6F1E7" />
				<rect x="468" y="218" width="264" height="264" rx="60" fill="#1E4FA3" />
				<text
					x="600"
					y="368"
					text-anchor="middle"
					font-family="Georgia, 'Times New Roman', serif"
					font-weight="700"
					font-size="150"
					fill="#FBF8F1"
				>
					LC
				</text>
				<rect x="556" y="420" width="88" height="12" rx="6" fill="#D2A847" />
				<text
					x="600"
					y="556"
					text-anchor="middle"
					font-family="Georgia, serif"
					font-weight="600"
					font-size="44"
					fill="#211E18"
				>
					Lions Club Bonn-Rheinaue
				</text>
			</svg>
		</template>
	</head>
	<body>
		<div id="root"></div>
		<script type="text/babel" src="helpers.jsx"></script>
		<script type="text/babel" src="LoginScreen.jsx"></script>
		<script type="text/babel" src="EventListScreen.jsx"></script>
		<script type="text/babel" src="EventDetailScreen.jsx"></script>
		<script type="text/babel" src="MembersScreen.jsx"></script>
		<script type="text/babel" src="ProfileScreen.jsx"></script>
		<script type="text/babel" src="AttendanceScreen.jsx"></script>
		<script type="text/babel" src="TreasurerScreen.jsx"></script>
		<script type="text/babel">
			const noop = () => {};
			const {
				PhoneFrame,
				LoginScreen,
				EventListScreen,
				EventDetailScreen,
				MembersScreen,
				ProfileScreen,
				AttendanceScreen,
				TreasurerScreen
			} = window;

			function Item({ n, title, children }) {
				return (
					<div className="item">
						<div className="cap">
							<small>{n}</small>
							{title}
						</div>
						<PhoneFrame>{children}</PhoneFrame>
					</div>
				);
			}

			function ScreensDoc() {
				const emblem =
					(window.__resources && window.__resources.lionsEmblem) || '../../assets/lions-emblem.png';
				return (
					<React.Fragment>
						<header className="doc-head">
							<img src={emblem} alt="Lions Clubs International Emblem" />
							<div className="eyebrow" style={{ marginTop: 10 }}>
								Clubverwaltungs-App · Lions 2.0
							</div>
							<h1>Lions Club Bonn-Rheinaue</h1>
							<p>Alle Kern-Screens im Überblick</p>
						</header>
						<div className="grid">
							<Item n="01" title="Login (E-Mail-OTP)">
								<LoginScreen onLogin={noop} />
							</Item>
							<Item n="02" title="Terminübersicht">
								<EventListScreen onOpen={noop} />
							</Item>
							<Item n="03" title="Termin-Detail">
								<EventDetailScreen eventId="e1" onBack={noop} />
							</Item>
							<Item n="04" title="Mitgliederverzeichnis">
								<MembersScreen onOpen={noop} />
							</Item>
							<Item n="05" title="Mein Profil">
								<ProfileScreen />
							</Item>
							<Item n="06" title="Anwesenheit erfassen">
								<AttendanceScreen onBack={noop} />
							</Item>
							<Item n="07" title="Schatzmeister-Auswertung">
								<TreasurerScreen onBack={noop} />
							</Item>
						</div>
					</React.Fragment>
				);
			}
			const _root = window.__lcScreensRoot || ReactDOM.createRoot(document.getElementById('root'));
			window.__lcScreensRoot = _root;
			_root.render(<ScreensDoc />);
			requestAnimationFrame(() => window.lucide && window.lucide.createIcons());
		</script>
	</body>
</html>
