<!doctype html>
<html lang="de">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Offline – Lions Club Bonn-Rheinaue</title>
		<style>
			:root {
				color-scheme: light;
			}
			body {
				margin: 0;
				min-height: 100dvh;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 1rem;
				padding: 2rem;
				text-align: center;
				background: #f6f1e7;
				color: #1f2a37;
				font-family:
					system-ui,
					-apple-system,
					'Segoe UI',
					Roboto,
					sans-serif;
				font-size: 17px;
			}
			h1 {
				font-size: 1.4rem;
				color: #1e4fa3;
				margin: 0;
			}
			p {
				max-width: 28rem;
				line-height: 1.5;
				color: #4b5563;
			}
			button {
				min-height: 44px;
				padding: 0 1.25rem;
				border: none;
				border-radius: 999px;
				background: #1e4fa3;
				color: #fff;
				font: inherit;
				font-weight: 600;
				cursor: pointer;
			}
		</style>
	</head>
	<body>
		<h1>Keine Verbindung</h1>
		<p>
			Du bist gerade offline. Sobald du wieder Netz hast, kannst du die App normal weiternutzen.
		</p>
		<button onclick="location.reload()">Erneut versuchen</button>
	</body>
</html>
